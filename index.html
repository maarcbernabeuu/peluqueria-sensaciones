                          <div style={{fontWeight:500,fontSize:13,color:C.text,marginBottom:3}}>{s.name}</div>

                          <div style={{fontSize:11,color:C.muted}}>{s.duration} min · <span style={{fontWeight:600,color:sp.color}}>{s.price}€</span></div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </>
            )}

            {/* STEP 2 – Calendario */}
            {step===2&&(()=>{
              const{year,month,daysInMonth,firstDay,monthNames,isPast,isSunday}=buildCal();
              const dayNames=["L","M","X","J","V","S","D"];
              return(
                <>
                  <h2 style={{fontFamily:SERIF,fontSize:28,color:C.text,margin:"0 0 6px",fontWeight:500}}>Elige el día</h2>
                  <p style={{fontSize:13,color:C.muted,margin:"0 0 18px"}}>Selecciona una fecha para ver quién está disponible</p>

                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",marginBottom:20,display:"flex",justifyContent:"space-between",fontSize:13}}>
                    <span style={{color:C.primary}}>{service?.name}</span>
                    <span style={{color:C.muted}}>{service?.duration} min · {service?.price}€</span>
                  </div>

                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,overflow:"hidden",marginBottom:22}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 18px",borderBottom:`1px solid ${C.border}`,background:C.bgSoft}}>
                      <button onClick={()=>setCalMonth(new Date(year,month-1,1))} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 14px",color:C.primary,cursor:"pointer",fontSize:15,fontFamily:FONT}}>‹</button>
                      <div style={{fontFamily:SERIF,fontSize:17,fontStyle:"italic",color:C.text}}>{monthNames[month]} {year}</div>
                      <button onClick={()=>setCalMonth(new Date(year,month+1,1))} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 14px",color:C.primary,cursor:"pointer",fontSize:15,fontFamily:FONT}}>›</button>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",padding:"10px 10px 2px"}}>
                      {dayNames.map((d,i)=><div key={d} style={{textAlign:"center",fontSize:11,color:i===6?C.danger:C.muted,padding:"4px 0",letterSpacing:"0.06em"}}>{d}</div>)}
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,padding:"4px 10px 14px"}}>
                      {Array.from({length:firstDay}).map((_,i)=><div key={`e${i}`}/>)}
                      {Array.from({length:daysInMonth}).map((_,i)=>{
                        const day=i+1;
                        const ds=getDateStr(year,month,day);
                        const past=isPast(day),sun=isSunday(day);
                        const available=getStylistsAvailableOnDate(service?.name,ds);
                        const none=available.length===0&&!past&&!sun;
                        const selected=date===ds;
                        const disabled=past||sun||none;

                        let bg="transparent",borderC=C.borderLight,textC=C.textSoft;
                        if(selected){bg=C.primary;borderC=C.primary;textC="#0F0E0E";}
                        else if(past||sun){borderC="transparent";textC=C.border;}
                        else if(none){bg:C.dangerLight;borderC="#C0404025";textC=C.danger;}
                        else if(available.length<Object.keys(STYLISTS).length){bg:C.primaryLight;borderC=`${C.primary}35`;textC=C.primary;}
                        else{borderC=C.border;}

                        return(
                          <button key={day} disabled={disabled} onClick={()=>{setDate(ds);setStylist(null);setTime("");setStep(3);}}
                            style={{aspectRatio:"1",borderRadius:8,border:`1px solid ${borderC}`,background:bg,color:textC,fontSize:13,cursor:disabled?"default":"pointer",fontFamily:FONT,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,transition:"all 0.12s"}}>
                            <span>{day}</span>
                            {!past&&!sun&&!none&&!selected&&<span style={{fontSize:6,color:C.primary}}>{"●".repeat(Math.min(available.length,4))}</span>}
                            {none&&<span style={{fontSize:6,color:C.danger}}>✗</span>}
                          </button>
                        );
                      })}
                    </div>
                    <div style={{display:"flex",gap:16,padding:"8px 14px 12px",borderTop:`1px solid ${C.border}`,flexWrap:"wrap"}}>
                      {[{bg:"transparent",border:C.border,label:"Con disponibilidad"},{bg:C.primaryLight,border:`${C.primary}35`,label:"Disponibilidad parcial"},{bg:C.dangerLight,border:"#C0404025",label:"Sin disponibilidad"}].map(l=>(
                        <div key={l.label} style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:C.muted}}>
                          <div style={{width:14,height:14,borderRadius:4,background:l.bg,border:`1px solid ${l.border}`}}/>{l.label}
                        </div>
                      ))}
                    </div>
                  </div>
                </>
              );
            })()}

            {/* STEP 3 – Estilistas disponibles ese día */}
            {step===3&&(()=>{
              const available=getStylistsAvailableOnDate(service?.name,date);
              const morningSlots=ALL_SLOTS.filter(t=>t<"14:00");
              const afternoonSlots=ALL_SLOTS.filter(t=>t>="14:00");
              return(
                <>
                  <h2 style={{fontFamily:SERIF,fontSize:28,color:C.text,margin:"0 0 4px",fontWeight:500}}>Disponibilidad</h2>
                  <p style={{fontSize:13,color:C.muted,margin:"0 0 6px"}}><em style={{color:C.primary,fontStyle:"italic"}}>{cap(fmtDate(date))}</em></p>
                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",marginBottom:22,display:"flex",justifyContent:"space-between",fontSize:13}}>
                    <span style={{color:C.primary}}>{service?.name}</span>
                    <span style={{color:C.muted}}>{service?.duration} min · {service?.price}€</span>
                  </div>

                  {available.length===0&&(
                    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"32px",textAlign:"center",color:C.muted}}>
                      No hay disponibilidad para este día. Por favor elige otra fecha.
                    </div>
                  )}

                  <div style={{display:"grid",gap:14}}>
                    {available.map(st=>{
                      const isSelected=stylist?.id===st.id;
                      const freeSlots=ALL_SLOTS.filter(t=>!slotTaken(date,t,st.id));
                      const freeMorning=morningSlots.filter(t=>!slotTaken(date,t,st.id));
                      const freeAfternoon=afternoonSlots.filter(t=>!slotTaken(date,t,st.id));
                      return(
                        <div key={st.id} style={{background:isSelected?`${st.color}12`:C.card,border:`2px solid ${isSelected?st.color:C.border}`,borderRadius:14,overflow:"hidden",transition:"all 0.18s"}}>
                          {/* Cabecera estilista */}
                          <div onClick={()=>setStylist(isSelected?null:st)}
                            style={{display:"flex",alignItems:"center",gap:14,padding:"16px 18px",cursor:"pointer",borderBottom:isSelected?`1px solid ${C.border}`:"none"}}>
                            <div style={{width:48,height:48,borderRadius:"50%",background:`${st.color}20`,border:`1px solid ${st.color}50`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{st.emoji}</div>
                            <div style={{flex:1}}>
                              <div style={{fontFamily:SERIF,fontSize:20,fontStyle:"italic",color:st.color}}>{st.name}</div>
                              <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>{st.role}</div>
                            </div>
                            <div style={{textAlign:"right"}}>
                              <div style={{fontSize:12,color:C.muted}}>{freeSlots.length} huecos libres</div>
                              <div style={{fontSize:11,color:isSelected?st.color:C.muted,marginTop:2}}>{isSelected?"▲ Ocultar":"▼ Ver horas"}</div>
                            </div>
                          </div>

                          {/* Slots del estilista */}
                          {isSelected&&(
                            <div style={{padding:"16px 18px"}}>
                              {[["Mañana",freeMorning],["Tarde",freeAfternoon]].map(([label,slots])=>slots.length>0&&(
                                <div key={label} style={{marginBottom:12}}>
                                  <div style={{fontSize:10,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.1em"}}>{label}</div>
                                  <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                                    {slots.map(t=>{
                                      const sel=time===t;
                                      return(
                                        <button key={t} onClick={()=>{setTime(t);}}
                                          style={{padding:"9px 16px",borderRadius:6,fontSize:13,fontFamily:FONT,cursor:"pointer",
                                            border:sel?`1px solid ${st.color}`:"1px solid #5A9E6E50",
                                            background:sel?st.color:"#5A9E6E15",
                                            color:sel?"#0F0E0E":C.success,fontWeight:sel?600:400}}>
                                          {t} ✓
                                        </button>
                                      );
                                    })}
                                  </div>
                                </div>
                              ))}
                              {time&&(
                                <div style={{marginTop:14,textAlign:"right"}}>
                                  <button onClick={()=>setStep(4)} style={primaryBtn}>Continuar →</button>
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </>
              );
            })()}

            {/* STEP 4 – Datos */}
            {step===4&&(
              <>
                <h2 style={{fontFamily:SERIF,fontSize:28,color:C.text,margin:"0 0 6px",fontWeight:500}}>Tus datos</h2>
                <p style={{fontSize:13,color:C.muted,margin:"0 0 20px"}}>Para confirmar tu reserva</p>
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px",marginBottom:22,fontSize:13}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                    <span style={{color:C.primary,fontWeight:500}}>{service?.name}</span>
                    <span style={{color:C.primary}}>{service?.price}€</span>
                  </div>
                  <div style={{display:"flex",gap:16,flexWrap:"wrap",color:C.muted}}>
                    <span>{cap(fmtDate(date))} · {time}h</span>
                    <span>{stylist?.emoji} {stylist?.name}</span>
                  </div>
                </div>
                <div style={{display:"grid",gap:16}}>
                  <div>
                    <label style={{fontSize:11,fontWeight:500,color:C.textSoft,display:"block",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>Nombre completo *</label>
                    <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Ej: María García" style={inp}/>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                    <div>
                      <label style={{fontSize:11,fontWeight:500,color:C.textSoft,display:"block",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>Teléfono *</label>
                      <input value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} placeholder="612 345 678" style={inp}/>
                    </div>
                    <div>
                      <label style={{fontSize:11,fontWeight:500,color:C.textSoft,display:"block",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>Email (opcional)</label>
                      <input value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} placeholder="correo@email.com" style={inp}/>
                    </div>
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:500,color:C.textSoft,display:"block",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>Notas (opcional)</label>
                    <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Cuéntanos algo sobre lo que buscas..." rows={3} style={{...inp,resize:"vertical"}}/>
                  </div>
                </div>
                <div style={{marginTop:24,textAlign:"right"}}>
                  <button onClick={submitBooking} disabled={!form.name||!form.phone} style={{...primaryBtn,opacity:!form.name||!form.phone?0.4:1,cursor:!form.name||!form.phone?"default":"pointer"}}>
                    Confirmar reserva ✓
                  </button>
                </div>
              </>
            )}

            {/* STEP 5 – Confirmación */}
            {step===5&&(
              <div style={{textAlign:"center",padding:"20px 0 40px"}}>
                <div style={{width:72,height:72,border:`1px solid ${C.primary}`,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 24px",fontSize:28}}>✓</div>
                <h2 style={{fontFamily:SERIF,fontSize:34,color:C.text,margin:"0 0 12px",fontWeight:500}}>¡Reserva recibida!</h2>
                <p style={{fontSize:14,color:C.muted,margin:"0 auto 30px",maxWidth:400,lineHeight:1.8}}>
                  El equipo te confirmará la cita en breve. Cualquier duda, llama al <span style={{color:C.text}}>623 250 975</span>.
                </p>
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"22px",maxWidth:380,margin:"0 auto 28px",textAlign:"left"}}>
                  <div style={{fontSize:10,color:C.muted,marginBottom:14,textTransform:"uppercase",letterSpacing:"0.1em"}}>Resumen</div>
                  {[["Servicio",service?.name],["Estilista",`${stylist?.emoji} ${stylist?.name}`],["Fecha",cap(fmtDate(date))],["Hora",`${time}h`],["Nombre",form.name],["Teléfono",form.phone]].map(([k,v])=>(
                    <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"7px 0",borderBottom:`1px solid ${C.border}`}}>
                      <span style={{color:C.muted}}>{k}</span><span style={{color:C.text}}>{v}</span>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>
                  <button onClick={downloadICS}
                    style={{display:"flex",alignItems:"center",gap:10,padding:"13px 28px",borderRadius:6,border:"none",cursor:"pointer",fontSize:14,fontWeight:500,fontFamily:FONT,background:C.primary,color:"#0F0E0E",width:"100%",maxWidth:280,justifyContent:"center"}}>
                    <span style={{fontSize:18}}>📅</span>
                    Añadir al calendario
                  </button>
                  <div style={{fontSize:11,color:C.muted,textAlign:"center",maxWidth:260,lineHeight:1.6}}>
                    Compatible con Google Calendar, Apple Calendar y cualquier app de calendario en Android e iPhone
                  </div>
                  <button onClick={goHome} style={{...outlineBtn,width:"100%",maxWidth:280,textAlign:"center"}}>Volver al inicio</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );

      // ── MIS CITAS ─────────────────────────────────────────────
      if(view==="miscitas") return(
        <div style={{background:C.bg,minHeight:"100vh",fontFamily:FONT,color:C.text}}>
          <div style={{background:C.bgSoft,borderBottom:`1px solid ${C.border}`,padding:"0 24px"}}>
            <div style={{maxWidth:700,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:58}}>
              <button onClick={()=>setView("home")} style={ghostBtn}>← Inicio</button>
              <div style={{fontFamily:SERIF,fontSize:18,fontStyle:"italic",color:C.primary}}>Mis citas</div>
              <div style={{width:60}}/>
            </div>
          </div>

          <div style={{maxWidth:700,margin:"0 auto",padding:"36px 24px"}}>
            <h2 style={{fontFamily:SERIF,fontSize:28,color:C.text,margin:"0 0 8px",fontWeight:500}}>Tus reservas</h2>
            <p style={{fontSize:13,color:C.muted,margin:"0 0 24px"}}>Introduce tu email o teléfono para ver tus citas</p>

            {/* Buscador */}
            <div style={{display:"flex",gap:10,marginBottom:28}}>
              <input value={misCitasEmail} onChange={e=>setMiscitasEmail(e.target.value)}
                placeholder="Email o teléfono..." style={{...inp,flex:1}}/>
              <button onClick={()=>setMisCitasSearch(misCitasEmail)}
                style={{...primaryBtn,padding:"11px 20px",whiteSpace:"nowrap"}}>Buscar</button>
            </div>

            {/* Resultados */}
            {misCitasSearch&&(()=>{
              const myCitas=appts.filter(a=>
                (a.email&&a.email.toLowerCase()===misCitasSearch.toLowerCase())||
                (a.phone&&a.phone.replace(/\s/g,"")===misCitasSearch.replace(/\s/g,""))
              ).sort((a,b)=>a.date===b.date?a.time.localeCompare(b.time):a.date.localeCompare(b.date));

              if(myCitas.length===0) return(
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"40px",textAlign:"center",color:C.muted}}>
                  No encontramos citas con ese email o teléfono.
                </div>
              );

              return(
                <div style={{display:"grid",gap:12}}>
                  {myCitas.map(a=>{
                    const st=STYLISTS[a.stylist];
                    const isPast=new Date(a.date+"T23:59:00")<new Date();
                    const isCancelled=a.status==="cancelada";
                    return(
                      <div key={a.id} style={{background:C.card,border:`1.5px solid ${isCancelled?"#C0404030":isPast?C.border:C.borderLight}`,borderRadius:12,padding:"18px 20px",opacity:isCancelled||isPast?0.65:1}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
                          <div>
                            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                              <span style={{fontWeight:500,fontSize:15,color:C.text}}>{a.service}</span>
                              <span style={{fontSize:11,fontWeight:600,padding:"2px 10px",borderRadius:20,...statusStyle(a.status)}}>{cap(a.status)}</span>
                            </div>
                            <div style={{fontSize:13,color:C.muted,marginBottom:3}}>
                              📅 {cap(fmtDate(a.date))} · 🕐 {a.time}h
                            </div>
                            {st&&<div style={{fontSize:13,color:C.muted}}>
                              {st.emoji} {st.name}
                            </div>}
                          </div>
                          {!isCancelled&&!isPast&&localIds.includes(a.id)&&(
                            <button onClick={()=>{if(window.confirm("¿Seguro que quieres cancelar esta cita?"))cancelMiCita(a.id);}}
                              style={{padding:"8px 16px",borderRadius:8,border:`1px solid ${C.danger}`,background:C.dangerLight,color:C.danger,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:FONT,whiteSpace:"nowrap"}}>
                              ❌ Cancelar cita
                            </button>
                          )}
                          {!isCancelled&&!isPast&&!localIds.includes(a.id)&&(
                            <span style={{fontSize:11,color:C.muted,fontStyle:"italic"}}>Solo cancelable desde el dispositivo original</span>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}

            {!misCitasSearch&&(
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"40px",textAlign:"center",color:C.muted,fontSize:14}}>
                Introduce tu email o teléfono y pulsa Buscar
              </div>
            )}
          </div>
        </div>
      );

      // ── ADMIN ─────────────────────────────────────────────────
      if(view==="admin") return(
        <div style={{background:C.bg,minHeight:"100vh",fontFamily:FONT,color:C.text}}>
          <div style={{background:C.bgSoft,borderBottom:`1px solid ${C.border}`,padding:"0 24px"}}>
            <div style={{maxWidth:1080,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:54}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <button onClick={()=>setView("home")} style={ghostBtn}>← Inicio</button>
                <span style={{color:C.border}}>|</span>
                <div style={{fontFamily:SERIF,fontSize:17,fontStyle:"italic",color:C.primary}}>Panel · Sensaciones Estilistas</div>
              </div>
              {adminAuth&&<button onClick={()=>{setAdminAuth(false);setAdminPass("");}} style={{background:C.bgSoft,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 14px",fontSize:12,color:C.muted,cursor:"pointer",fontFamily:FONT}}>Salir</button>}
            </div>
          </div>

          <div style={{maxWidth:1080,margin:"0 auto",padding:"36px 24px"}}>
            {!adminAuth&&(
              <div style={{maxWidth:380,margin:"0 auto"}}>
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"40px 32px"}}>
                  <div style={{textAlign:"center",marginBottom:28}}>
                    <div style={{fontFamily:SERIF,fontSize:28,fontStyle:"italic",color:C.primary,marginBottom:6}}>Acceso privado</div>
                    <p style={{fontSize:13,color:C.muted}}>Solo para el equipo de Sensaciones</p>
                  </div>
                  <label style={{fontSize:11,fontWeight:500,color:C.textSoft,display:"block",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>Contraseña</label>
                  <input type="password" value={adminPass} onChange={e=>setAdminPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryLogin()} placeholder="••••••••" style={{...inp,marginBottom:12}}/>
                  {adminErr&&<div style={{fontSize:12,color:C.danger,marginBottom:10}}>{adminErr}</div>}
                  <button onClick={tryLogin} style={{...primaryBtn,width:"100%",textAlign:"center"}}>Entrar</button>
                  <div style={{fontSize:11,color:C.muted,textAlign:"center",marginTop:12}}>Demo: sensaciones2024</div>
                </div>
              </div>
            )}

            {adminAuth&&(
              <>
                {/* KPIs */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:12,marginBottom:28}}>
                  {[
                    {label:"Citas hoy",value:todayAppts.length,color:C.primary,bg:C.primaryLight},
                    {label:"Confirmadas",value:todayAppts.filter(a=>a.status==="confirmada").length,color:C.success,bg:C.successLight},
                    {label:"Pendientes",value:appts.filter(a=>a.status==="pendiente").length,color:C.warning,bg:C.warningLight},
                    {label:"Total agenda",value:appts.length,color:C.muted,bg:C.bgSoft},
                  ].map((k,i)=>(
                    <div key={i} style={{background:k.bg,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px",textAlign:"center"}}>
                      <div style={{fontFamily:SERIF,fontSize:30,fontStyle:"italic",color:k.color,lineHeight:1}}>{k.value}</div>
                      <div style={{fontSize:11,color:C.muted,marginTop:4,textTransform:"uppercase",letterSpacing:"0.05em"}}>{k.label}</div>
                    </div>
                  ))}
                </div>

                {/* Filtros */}
                <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
                  {[["hoy","Hoy"],["manana","Mañana"],["todas","Todas"]].map(([k,label])=>(
                    <button key={k} onClick={()=>setFilter(k)}
                      style={{padding:"7px 16px",borderRadius:6,border:`1px solid ${filter===k?C.primary:C.border}`,background:filter===k?C.primaryLight:C.card,color:filter===k?C.primary:C.muted,fontSize:13,cursor:"pointer",fontFamily:FONT}}>
                      {label}
                    </button>
                  ))}
                  {Object.values(STYLISTS).map(st=>(
                    <button key={st.id} onClick={()=>setFilter(st.id)}
                      style={{padding:"7px 16px",borderRadius:6,border:`1px solid ${filter===st.id?st.color:C.border}`,background:filter===st.id?`${st.color}20`:C.card,color:filter===st.id?st.color:C.muted,fontSize:13,cursor:"pointer",fontFamily:FONT}}>
                      {st.emoji} {st.name}
                    </button>
                  ))}
                </div>

                {/* Lista citas */}
                <div style={{display:"grid",gap:8}}>
                  {getFiltered().length===0&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"36px",textAlign:"center",color:C.muted}}>No hay citas para este período</div>}
                  {getFiltered().map(a=>{
                    const st=STYLISTS[a.stylist];
                    const isReassigning=reassignId===a.id;
                    const validStylists=SERVICE_STYLISTS[a.service]||Object.keys(STYLISTS);
                    return(
                      <div key={a.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"15px 18px"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
                          <div style={{flex:1,minWidth:200}}>
                            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,flexWrap:"wrap"}}>
                              <span style={{fontWeight:500,fontSize:15,color:C.text}}>{a.name}</span>
                              <span style={{fontSize:11,fontWeight:600,padding:"2px 10px",borderRadius:20,...statusStyle(a.status)}}>{cap(a.status)}</span>
                              <span style={{fontSize:11,padding:"2px 10px",borderRadius:20,background:`${getCatColor(a.service)}20`,color:getCatColor(a.service)}}>{a.service}</span>
                            </div>
                            <div style={{fontSize:13,color:C.muted,marginBottom:3}}>{cap(fmtDate(a.date))} · {a.time}h</div>
                            <div style={{fontSize:13,color:C.muted,marginBottom:4}}>{a.phone}{a.email?` · ${a.email}`:""}</div>

                            {/* Estilista asignado + botón reasignar */}
                            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                              {st&&<span style={{fontSize:12,padding:"3px 12px",borderRadius:20,background:`${st.color}20`,color:st.color,border:`1px solid ${st.color}40`}}>{st.emoji} {st.name}</span>}
                              <button onClick={()=>setReassignId(isReassigning?null:a.id)}
                                style={{background:"none",border:`1px solid ${C.border}`,borderRadius:20,padding:"3px 12px",fontSize:11,color:C.muted,cursor:"pointer",fontFamily:FONT}}>
                                {isReassigning?"Cancelar":"↔ Cambiar estilista"}
                              </button>
                            </div>

                            {/* Selector reasignación */}
                            {isReassigning&&(
                              <div style={{marginTop:10,display:"flex",flexWrap:"wrap",gap:8}}>
                                {validStylists.map(sid=>{
                                  const s2=STYLISTS[sid];
                                  if(!s2)return null;
                                  const isCurrent=a.stylist===sid;
                                  return(
                                    <button key={sid} disabled={isCurrent} onClick={()=>reassignStylist(a.id,sid)}
                                      style={{padding:"6px 14px",borderRadius:20,border:`1px solid ${isCurrent?s2.color:C.border}`,background:isCurrent?`${s2.color}20`:C.bgSoft,color:isCurrent?s2.color:C.textSoft,fontSize:12,cursor:isCurrent?"default":"pointer",fontFamily:FONT,opacity:isCurrent?1:0.85}}>
                                      {s2.emoji} {s2.name}{isCurrent?" ✓":""}
                                    </button>
                                  );
                                })}
                              </div>
                            )}

                            {a.notes&&<div style={{fontSize:12,color:C.muted,marginTop:6,fontStyle:"italic",background:C.bgSoft,padding:"5px 10px",borderRadius:6}}>{a.notes}</div>}
                          </div>

                          <div style={{display:"flex",gap:6,flexShrink:0}}>
                            {a.status==="pendiente"&&<>
                              <button onClick={()=>updateStatus(a.id,"confirmada")} style={{padding:"7px 14px",borderRadius:6,border:`1px solid ${C.success}`,background:C.successLight,color:C.success,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:FONT}}>Confirmar</button>
                              <button onClick={()=>updateStatus(a.id,"cancelada")}  style={{padding:"7px 14px",borderRadius:6,border:`1px solid ${C.danger}`, background:C.dangerLight, color:C.danger, fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:FONT}}>Cancelar</button>
                            </>}
                            {a.status==="confirmada"&&<button onClick={()=>updateStatus(a.id,"cancelada")} style={{padding:"7px 14px",borderRadius:6,border:`1px solid ${C.danger}`,background:C.dangerLight,color:C.danger,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:FONT}}>Cancelar</button>}
                            {a.status==="cancelada"&&<button onClick={()=>updateStatus(a.id,"pendiente")} style={{padding:"7px 14px",borderRadius:6,border:`1px solid ${C.border}`,background:C.bgSoft,color:C.muted,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:FONT}}>Reactivar</button>}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </div>
        </div>
      );
      return null;
    }
    const root=ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
