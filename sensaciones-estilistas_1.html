<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sensaciones Estilistas — Reserva tu cita</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet" />
  <style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: #0F0E0E; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const C = {
      bg: "#0F0E0E",
      bgSoft: "#171515",
      card: "#1D1B1B",
      cardHover: "#232020",
      primary: "#C9A96E",
      primaryLight: "#C9A96E22",
      primaryMid: "#D4B87A",
      primaryDark: "#9E7D4A",
      accent: "#E8D5B0",
      text: "#F0EDE8",
      textSoft: "#BDB8B0",
      muted: "#7A7470",
      border: "#2C2828",
      borderLight: "#3A3535",
      success: "#5A9E6E",
      successLight: "#5A9E6E22",
      warning: "#C9893A",
      warningLight: "#C9893A22",
      danger: "#C04040",
      dangerLight: "#C0404022",
    };

    const FONT = "'Jost', 'Segoe UI', system-ui, sans-serif";
    const SERIF = "'Playfair Display', Georgia, serif";

    const SPECIALTIES = [
      {
        category: "Para ella",
        emoji: "💇‍♀️",
        color: C.primary,
        services: [
          { id: 1, name: "Corte femenino", duration: 45, price: 22, desc: "Corte personalizado adaptado a tu estilo" },
          { id: 2, name: "Tinte", duration: 90, price: 45, desc: "Coloración profesional con productos de calidad" },
          { id: 3, name: "Mechas / Balayage", duration: 120, price: 65, desc: "Técnicas de iluminación y degradado natural" },
          { id: 4, name: "Alisador", duration: 90, price: 55, desc: "Alisado profesional de larga duración" },
          { id: 5, name: "Permanente", duration: 90, price: 50, desc: "Ondas y rizos duraderos" },
          { id: 6, name: "Tratamiento de hidratación", duration: 60, price: 35, desc: "Nutrición profunda para un cabello brillante y sano" },
          { id: 7, name: "Recogido", duration: 60, price: 40, desc: "Recogidos elegantes para cualquier ocasión" },
          { id: 8, name: "Peinado", duration: 45, price: 25, desc: "Peinado profesional para lucir en cualquier evento" },
          { id: 9, name: "Trenzas", duration: 60, price: 30, desc: "Todo tipo de trenzas y estilos trenzados" },
        ],
      },
      {
        category: "Para él",
        emoji: "💈",
        color: "#7EAEC9",
        services: [
          { id: 10, name: "Corte caballero", duration: 30, price: 14, desc: "Corte moderno y personalizado" },
          { id: 11, name: "Corte niños", duration: 20, price: 10, desc: "Corte infantil cómodo y divertido" },
          { id: 12, name: "Arreglo de barba", duration: 20, price: 10, desc: "Perfilado y acabado profesional de barba" },
          { id: 13, name: "Corte + Barba", duration: 45, price: 22, desc: "Pack completo: corte y arreglo de barba" },
          { id: 14, name: "Tratamiento barba", duration: 30, price: 18, desc: "Hidratación y cuidado profundo de la barba" },
        ],
      },
      {
        category: "Sala Beauty Relax",
        emoji: "✨",
        color: "#C97EA9",
        services: [
          { id: 15, name: "Depilación Láser", duration: 30, price: 40, desc: "Depilación definitiva con láser de última generación" },
          { id: 16, name: "Micropigmentación", duration: 90, price: 80, desc: "Diseño y definición permanente de cejas, labios y ojos" },
          { id: 17, name: "Maquillaje profesional", duration: 60, price: 45, desc: "Maquillaje artístico para cualquier ocasión" },
          { id: 18, name: "Depilación facial", duration: 20, price: 15, desc: "Depilación suave y precisa del rostro" },
          { id: 19, name: "Presoterapia", duration: 45, price: 35, desc: "Drenaje linfático y relajación con presoterapia" },
        ],
      },
    ];

    const ALL_SLOTS = ["10:00","10:30","11:00","11:30","12:00","12:30","13:00","16:00","16:30","17:00","17:30","18:00","18:30","19:00","19:30"];

    const TODAY = new Date().toISOString().split("T")[0];

    const SAMPLE = [
      { id: 1, name: "Lucía Navarro", phone: "612 345 678", email: "lucia@email.com", service: "Mechas / Balayage", date: "2026-05-13", time: "10:00", status: "confirmada", notes: "Quiere balayage rubio natural" },
      { id: 2, name: "Carlos Pérez", phone: "698 765 432", email: "", service: "Corte + Barba", date: "2026-05-13", time: "11:00", status: "pendiente", notes: "" },
      { id: 3, name: "Ana Martínez Soler", phone: "654 321 987", email: "ana@email.com", service: "Depilación Láser", date: "2026-05-14", time: "16:00", status: "pendiente", notes: "Segunda sesión" },
      { id: 4, name: "Sofía García", phone: "677 889 900", email: "", service: "Recogido", date: "2026-05-14", time: "17:00", status: "confirmada", notes: "Para boda el sábado" },
      { id: 5, name: "Javier Blasco", phone: "623 456 789", email: "", service: "Corte caballero", date: "2026-05-15", time: "10:30", status: "pendiente", notes: "" },
    ];

    const getMaxDate = () => { const d = new Date(); d.setMonth(d.getMonth() + 3); return d.toISOString().split("T")[0]; };
    const fmtDate = (d) => new Date(d + "T12:00:00").toLocaleDateString("es-ES", { weekday: "long", day: "numeric", month: "long" });
    const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);
    const statusStyle = (s) => ({
      color: s === "confirmada" ? C.success : s === "cancelada" ? C.danger : C.warning,
      background: s === "confirmada" ? C.successLight : s === "cancelada" ? C.dangerLight : C.warningLight,
    });
    const getCatColor = (svcName) => {
      for (const sp of SPECIALTIES) if (sp.services.find((s) => s.name === svcName)) return sp.color;
      return C.primary;
    };

    function App() {
      const [view, setView] = useState("home");
      const [step, setStep] = useState(1);
      const [service, setService] = useState(null);
      const [date, setDate] = useState("");
      const [time, setTime] = useState("");
      const [form, setForm] = useState({ name: "", phone: "", email: "", notes: "" });
      const [appts, setAppts] = useState(SAMPLE);
      const [adminAuth, setAdminAuth] = useState(false);
      const [adminPass, setAdminPass] = useState("");
      const [adminErr, setAdminErr] = useState("");
      const [filter, setFilter] = useState("hoy");
      const [calMonth, setCalMonth] = useState(() => { const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), 1); });

      const slotTaken = (d, t) => appts.some((a) => a.date === d && a.time === t && a.status !== "cancelada");
      const submitBooking = () => { setAppts((p) => [...p, { id: Date.now(), ...form, service: service.name, date, time, status: "pendiente" }]); setStep(5); };
      const updateStatus = (id, status) => setAppts((p) => p.map((a) => (a.id === id ? { ...a, status } : a)));
      const tryLogin = () => { if (adminPass === "sensaciones2024") { setAdminAuth(true); setAdminErr(""); } else setAdminErr("Contraseña incorrecta."); };
      const goHome = () => { setView("home"); setStep(1); setService(null); setDate(""); setTime(""); setForm({ name: "", phone: "", email: "", notes: "" }); };

      const getFiltered = () => {
        if (filter === "hoy") return appts.filter((a) => a.date === TODAY).sort((a, b) => a.time.localeCompare(b.time));
        if (filter === "manana") { const t = new Date(); t.setDate(t.getDate() + 1); return appts.filter((a) => a.date === t.toISOString().split("T")[0]).sort((a, b) => a.time.localeCompare(b.time)); }
        return [...appts].sort((a, b) => a.date === b.date ? a.time.localeCompare(b.time) : a.date.localeCompare(b.date));
      };

      const todayAppts = appts.filter((a) => a.date === TODAY);
      const pendingTotal = appts.filter((a) => a.status === "pendiente").length;

      const inp = { width: "100%", padding: "11px 14px", border: `1px solid ${C.border}`, borderRadius: 8, fontSize: 14, background: C.bgSoft, color: C.text, boxSizing: "border-box", outline: "none", fontFamily: FONT };
      const primaryBtn = { padding: "12px 28px", borderRadius: 6, border: "none", cursor: "pointer", fontSize: 14, fontWeight: 500, fontFamily: FONT, background: C.primary, color: "#0F0E0E", letterSpacing: "0.03em" };
      const outlineBtn = { padding: "12px 28px", borderRadius: 6, border: `1px solid ${C.primary}`, cursor: "pointer", fontSize: 14, fontWeight: 500, fontFamily: FONT, background: "transparent", color: C.primary, letterSpacing: "0.03em" };
      const ghostBtn = { background: "none", border: "none", cursor: "pointer", color: C.muted, fontSize: 13, padding: 0, fontFamily: FONT };

      // HOME
      if (view === "home") return (
        <div style={{ background: C.bg, minHeight: "100vh", fontFamily: FONT, color: C.text }}>
          {/* Top bar */}
          <div style={{ background: C.bgSoft, borderBottom: `1px solid ${C.border}`, padding: "8px 24px", display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 24, fontSize: 12, color: C.muted }}>
            <span>📍 Av. Juan Carlos I, 58 · Ibi</span>
            <span>📞 623 250 975</span>
            <span>Instagram · Facebook</span>
          </div>

          {/* Header */}
          <div style={{ background: C.bgSoft, borderBottom: `1px solid ${C.border}`, padding: "0 32px" }}>
            <div style={{ maxWidth: 1080, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", height: 68, flexWrap: "wrap", gap: 10 }}>
              <div>
                <div style={{ fontFamily: SERIF, fontSize: 22, color: C.accent, letterSpacing: "0.02em" }}>Sensaciones Estilistas</div>
                <div style={{ fontSize: 10, color: C.muted, letterSpacing: "0.14em", textTransform: "uppercase" }}>Peluquería · Estética · Barbería · Ibi</div>
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={() => setView("admin")} style={{ ...outlineBtn, padding: "8px 16px", fontSize: 12 }}>Panel Admin</button>
                <button onClick={() => setView("booking")} style={{ ...primaryBtn, padding: "8px 20px", fontSize: 13 }}>Reservar cita</button>
              </div>
            </div>
          </div>

          {/* Hero */}
          <div style={{ padding: "70px 32px", textAlign: "center", borderBottom: `1px solid ${C.border}`, background: `radial-gradient(ellipse at 50% 0%, #C9A96E12 0%, transparent 70%)` }}>
            <div style={{ fontSize: 11, letterSpacing: "0.2em", color: C.primary, textTransform: "uppercase", marginBottom: 16 }}>Compromiso · Excelencia · Pasión</div>
            <h1 style={{ fontFamily: SERIF, fontSize: 46, color: C.text, margin: "0 0 16px", lineHeight: 1.2, fontWeight: 500 }}>
              Tu momento.<br/><em style={{ color: C.primary }}>Tu estilo.</em>
            </h1>
            <p style={{ fontSize: 15, color: C.textSoft, margin: "0 auto 32px", maxWidth: 460, lineHeight: 1.8 }}>
              Peluquería, barbería y estética en Ibi. Reserva tu cita ahora directamente — sin apps de terceros, sin comisiones.
            </p>
            <button onClick={() => setView("booking")} style={{ ...primaryBtn, fontSize: 15, padding: "14px 40px" }}>
              Reservar cita
            </button>
          </div>

          {/* Servicios */}
          <div style={{ maxWidth: 1080, margin: "0 auto", padding: "56px 32px" }}>
            <div style={{ textAlign: "center", marginBottom: 48 }}>
              <div style={{ fontFamily: SERIF, fontSize: 34, color: C.text, marginBottom: 8, fontWeight: 500 }}>Nuestros servicios</div>
              <div style={{ fontSize: 13, color: C.muted, letterSpacing: "0.04em" }}>Selecciona el servicio para reservar directamente</div>
            </div>

            {SPECIALTIES.map((sp) => (
              <div key={sp.category} style={{ marginBottom: 48 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
                  <span style={{ fontSize: 22 }}>{sp.emoji}</span>
                  <div style={{ fontFamily: SERIF, fontSize: 24, color: sp.color, fontStyle: "italic", fontWeight: 500 }}>{sp.category}</div>
                  <div style={{ flex: 1, height: 1, background: `${sp.color}30`, marginLeft: 8 }} />
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 12 }}>
                  {sp.services.map((s) => (
                    <div key={s.id} onClick={() => { setService(s); setStep(2); setView("booking"); }}
                      style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "18px 20px", cursor: "pointer", transition: "all 0.2s" }}
                      onMouseEnter={(e) => { e.currentTarget.style.background = C.cardHover; e.currentTarget.style.borderColor = sp.color + "80"; e.currentTarget.style.transform = "translateY(-2px)"; }}
                      onMouseLeave={(e) => { e.currentTarget.style.background = C.card; e.currentTarget.style.borderColor = C.border; e.currentTarget.style.transform = "none"; }}>
                      <div style={{ fontWeight: 500, fontSize: 14, color: C.text, marginBottom: 5 }}>{s.name}</div>
                      <div style={{ fontSize: 12, color: C.muted, marginBottom: 14, lineHeight: 1.6 }}>{s.desc}</div>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <span style={{ fontSize: 11, color: C.muted, background: C.bgSoft, padding: "3px 10px", borderRadius: 20, border: `1px solid ${C.border}` }}>{s.duration} min</span>
                        <span style={{ fontSize: 16, fontWeight: 500, color: sp.color }}>{s.price}€</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>

          {/* Footer */}
          <div style={{ background: C.bgSoft, borderTop: `1px solid ${C.border}`, padding: "32px" }}>
            <div style={{ maxWidth: 1080, margin: "0 auto", display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 20, fontSize: 13, color: C.muted }}>
              <div>
                <div style={{ fontFamily: SERIF, fontSize: 18, color: C.accent, marginBottom: 6 }}>Sensaciones Estilistas</div>
                <div>Av. Juan Carlos I, 58 · Ibi (Alicante)</div>
              </div>
              <div><div style={{ color: C.textSoft, marginBottom: 4 }}>Contacto</div><div>623 250 975</div></div>
              <div><div style={{ color: C.textSoft, marginBottom: 4 }}>Síguenos</div><div>Instagram · Facebook</div></div>
            </div>
          </div>
        </div>
      );

      // BOOKING
      if (view === "booking") return (
        <div style={{ background: C.bg, minHeight: "100vh", fontFamily: FONT, color: C.text }}>
          <div style={{ background: C.bgSoft, borderBottom: `1px solid ${C.border}`, padding: "0 24px" }}>
            <div style={{ maxWidth: 700, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", height: 58 }}>
              <button onClick={() => { if (step === 1 || step === 5) goHome(); else setStep((s) => s - 1); }} style={ghostBtn}>← {step === 1 || step === 5 ? "Inicio" : "Atrás"}</button>
              <div style={{ fontFamily: SERIF, fontSize: 18, color: C.primary, fontStyle: "italic" }}>{step < 5 ? "Reserva tu cita" : "¡Lista!"}</div>
              <div style={{ fontSize: 12, color: C.muted }}>{step < 5 ? `${step} / 4` : ""}</div>
            </div>
          </div>
          {step < 5 && <div style={{ height: 2, background: C.border }}><div style={{ height: "100%", background: C.primary, width: `${(step / 4) * 100}%`, transition: "width 0.3s" }} /></div>}

          <div style={{ maxWidth: 700, margin: "0 auto", padding: "40px 24px" }}>
            {step === 1 && (
              <>
                <h2 style={{ fontFamily: SERIF, fontSize: 28, color: C.text, margin: "0 0 6px", fontWeight: 500 }}>¿Qué servicio deseas?</h2>
                <p style={{ fontSize: 13, color: C.muted, margin: "0 0 28px", letterSpacing: "0.02em" }}>Selecciona el tratamiento que quieres reservar</p>
                {SPECIALTIES.map((sp) => (
                  <div key={sp.category} style={{ marginBottom: 28 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                      <span>{sp.emoji}</span>
                      <span style={{ fontFamily: SERIF, fontSize: 18, color: sp.color, fontStyle: "italic" }}>{sp.category}</span>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 8 }}>
                      {sp.services.map((s) => (
                        <div key={s.id} onClick={() => { setService(s); setStep(2); }}
                          style={{ background: service?.id === s.id ? C.primaryLight : C.card, border: `1px solid ${service?.id === s.id ? C.primary : C.border}`, borderRadius: 8, padding: "13px 14px", cursor: "pointer" }}>
                          <div style={{ fontWeight: 500, fontSize: 13, color: C.text, marginBottom: 4 }}>{s.name}</div>
                          <div style={{ fontSize: 11, color: C.muted, marginBottom: 8, lineHeight: 1.5 }}>{s.desc}</div>
                          <div style={{ fontSize: 11, color: C.muted }}>{s.duration} min · <span style={{ fontWeight: 600, color: sp.color }}>{s.price}€</span></div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </>
            )}

            {step === 2 && (() => {
              const year = calMonth.getFullYear();
              const month = calMonth.getMonth();
              const daysInMonth = new Date(year, month + 1, 0).getDate();
              const firstDay = (new Date(year, month, 1).getDay() + 6) % 7;
              const todayObj = new Date();
              const monthNames = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
              const dayNames = ["L","M","X","J","V","S","D"];
              const morningSlots = ALL_SLOTS.filter(t => t < "14:00");
              const afternoonSlots = ALL_SLOTS.filter(t => t >= "14:00");

              const getDateStr = (day) => `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
              const isPast = (day) => new Date(year, month, day) < new Date(todayObj.getFullYear(), todayObj.getMonth(), todayObj.getDate());
              const isSunday = (day) => new Date(year, month, day).getDay() === 0;
              const takenCount = (day) => ALL_SLOTS.filter(t => slotTaken(getDateStr(day), t)).length;

              return (
                <>
                  <h2 style={{ fontFamily: SERIF, fontSize: 28, color: C.text, margin: "0 0 6px", fontWeight: 500 }}>Elige fecha y hora</h2>
                  <p style={{ fontSize: 13, color: C.muted, margin: "0 0 20px" }}>Selecciona el día y después el horario disponible</p>

                  <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: "10px 14px", marginBottom: 22, display: "flex", justifyContent: "space-between", fontSize: 13 }}>
                    <span style={{ color: C.primary }}>{service?.name}</span>
                    <span style={{ color: C.muted }}>{service?.duration} min · {service?.price}€</span>
                  </div>

                  {/* Calendario */}
                  <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, overflow: "hidden", marginBottom: 22 }}>
                    {/* Nav mes */}
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 18px", borderBottom: `1px solid ${C.border}` }}>
                      <button onClick={() => { setCalMonth(new Date(year, month - 1, 1)); setDate(""); setTime(""); }}
                        style={{ background: "none", border: `1px solid ${C.border}`, borderRadius: 6, padding: "5px 14px", color: C.muted, cursor: "pointer", fontSize: 16, fontFamily: FONT }}>‹</button>
                      <div style={{ fontFamily: SERIF, fontSize: 17, color: C.text, fontStyle: "italic" }}>{monthNames[month]} {year}</div>
                      <button onClick={() => { setCalMonth(new Date(year, month + 1, 1)); setDate(""); setTime(""); }}
                        style={{ background: "none", border: `1px solid ${C.border}`, borderRadius: 6, padding: "5px 14px", color: C.muted, cursor: "pointer", fontSize: 16, fontFamily: FONT }}>›</button>
                    </div>

                    {/* Cabecera días */}
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", padding: "10px 10px 2px" }}>
                      {dayNames.map((d, i) => (
                        <div key={d} style={{ textAlign: "center", fontSize: 11, color: i === 6 ? "#C04040" : C.muted, padding: "4px 0", letterSpacing: "0.06em" }}>{d}</div>
                      ))}
                    </div>

                    {/* Días */}
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, padding: "4px 10px 14px" }}>
                      {Array.from({ length: firstDay }).map((_, i) => <div key={`e${i}`} />)}
                      {Array.from({ length: daysInMonth }).map((_, i) => {
                        const day = i + 1;
                        const ds = getDateStr(day);
                        const past = isPast(day);
                        const sun = isSunday(day);
                        const taken = takenCount(day);
                        const full = taken >= ALL_SLOTS.length;
                        const disabled = past || sun || full;
                        const selected = date === ds;
                        const partial = taken > 0 && taken < ALL_SLOTS.length;

                        let bg = "transparent", borderC = C.border, textC = C.textSoft;
                        if (selected) { bg = C.primary; borderC = C.primary; textC = "#0F0E0E"; }
                        else if (past || sun) { borderC = C.bgSoft; textC = C.border; }
                        else if (full) { bg = "#C0404015"; borderC = "#C0404035"; textC = C.danger; }
                        else if (partial) { bg = "#C9A96E10"; borderC = "#C9A96E40"; textC = C.primary; }

                        return (
                          <button key={day} disabled={disabled} onClick={() => { setDate(ds); setTime(""); }}
                            style={{ aspectRatio: "1", borderRadius: 8, border: `1px solid ${borderC}`, background: bg, color: textC, fontSize: 13, cursor: disabled ? "default" : "pointer", fontFamily: FONT, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 1, transition: "all 0.12s" }}>
                            <span>{day}</span>
                            {!past && !sun && taken > 0 && !selected && (
                              <span style={{ fontSize: 6, color: full ? C.danger : C.primary }}>{"●".repeat(Math.min(taken, 3))}</span>
                            )}
                          </button>
                        );
                      })}
                    </div>

                    {/* Leyenda */}
                    <div style={{ display: "flex", gap: 16, padding: "8px 16px 14px", borderTop: `1px solid ${C.border}`, flexWrap: "wrap" }}>
                      {[
                        { bg: C.bgSoft, border: C.border, label: "Libre" },
                        { bg: "#C9A96E10", border: "#C9A96E40", label: "Parcial" },
                        { bg: "#C0404015", border: "#C0404035", label: "Completo" },
                      ].map((l) => (
                        <div key={l.label} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: C.muted }}>
                          <div style={{ width: 14, height: 14, borderRadius: 4, background: l.bg, border: `1px solid ${l.border}` }} />
                          {l.label}
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Horarios */}
                  {date && (
                    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "18px 20px", marginBottom: 20 }}>
                      <div style={{ fontSize: 14, color: C.accent, marginBottom: 16, fontFamily: SERIF, fontStyle: "italic" }}>{cap(fmtDate(date))}</div>
                      {[["Mañana", morningSlots], ["Tarde", afternoonSlots]].map(([label, slots]) => (
                        <div key={label} style={{ marginBottom: 14 }}>
                          <div style={{ fontSize: 10, color: C.muted, marginBottom: 10, textTransform: "uppercase", letterSpacing: "0.1em" }}>{label}</div>
                          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                            {slots.map((t) => {
                              const taken = slotTaken(date, t);
                              const sel = time === t;
                              return (
                                <button key={t} disabled={taken} onClick={() => setTime(t)}
                                  style={{ padding: "9px 16px", borderRadius: 6, fontSize: 13, fontFamily: FONT, cursor: taken ? "default" : "pointer",
                                    border: sel ? `1px solid ${C.primary}` : taken ? "1px solid #C0404035" : "1px solid #5A9E6E50",
                                    background: sel ? C.primary : taken ? "#C0404015" : "#5A9E6E15",
                                    color: sel ? "#0F0E0E" : taken ? C.danger : C.success,
                                    fontWeight: sel ? 600 : 400,
                                  }}>
                                  {t} {taken ? "✗" : "✓"}
                                </button>
                              );
                            })}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}

                  {time && <div style={{ textAlign: "right" }}><button onClick={() => setStep(3)} style={primaryBtn}>Continuar →</button></div>}
                </>
              );
            })()}

            {step === 3 && (
              <>
                <h2 style={{ fontFamily: SERIF, fontSize: 28, color: C.text, margin: "0 0 6px", fontWeight: 500 }}>Tus datos</h2>
                <p style={{ fontSize: 13, color: C.muted, margin: "0 0 22px" }}>Para confirmar tu reserva</p>
                <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: "12px 16px", marginBottom: 22, fontSize: 13 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}><span style={{ color: C.primary }}>{service?.name}</span><span style={{ color: C.primary }}>{service?.price}€</span></div>
                  <div style={{ color: C.muted }}>{cap(fmtDate(date))} · {time}h</div>
                </div>
                <div style={{ display: "grid", gap: 16 }}>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 500, color: C.textSoft, display: "block", marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.06em" }}>Nombre completo *</label>
                    <input value={form.name} onChange={(e) => setForm((f) => ({ ...f, name: e.target.value }))} placeholder="Ej: María García" style={inp} />
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                    <div>
                      <label style={{ fontSize: 11, fontWeight: 500, color: C.textSoft, display: "block", marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.06em" }}>Teléfono *</label>
                      <input value={form.phone} onChange={(e) => setForm((f) => ({ ...f, phone: e.target.value }))} placeholder="612 345 678" style={inp} />
                    </div>
                    <div>
                      <label style={{ fontSize: 11, fontWeight: 500, color: C.textSoft, display: "block", marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.06em" }}>Email (opcional)</label>
                      <input value={form.email} onChange={(e) => setForm((f) => ({ ...f, email: e.target.value }))} placeholder="correo@email.com" style={inp} />
                    </div>
                  </div>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 500, color: C.textSoft, display: "block", marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.06em" }}>Notas (opcional)</label>
                    <textarea value={form.notes} onChange={(e) => setForm((f) => ({ ...f, notes: e.target.value }))} placeholder="Cuéntanos algo sobre lo que buscas..." rows={3} style={{ ...inp, resize: "vertical" }} />
                  </div>
                </div>
                <div style={{ marginTop: 24, textAlign: "right" }}>
                  <button onClick={submitBooking} disabled={!form.name || !form.phone} style={{ ...primaryBtn, opacity: !form.name || !form.phone ? 0.4 : 1, cursor: !form.name || !form.phone ? "default" : "pointer" }}>
                    Confirmar reserva ✓
                  </button>
                </div>
              </>
            )}

            {step === 5 && (
              <div style={{ textAlign: "center", padding: "20px 0 40px" }}>
                <div style={{ width: 72, height: 72, border: `1px solid ${C.primary}`, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 24px", fontSize: 28 }}>✓</div>
                <h2 style={{ fontFamily: SERIF, fontSize: 34, color: C.text, margin: "0 0 12px", fontWeight: 500 }}>¡Reserva recibida!</h2>
                <p style={{ fontSize: 14, color: C.muted, margin: "0 auto 30px", maxWidth: 400, lineHeight: 1.8 }}>
                  El equipo de Sensaciones te confirmará la cita en breve. Cualquier duda, llama al <span style={{ color: C.text }}>623 250 975</span>.
                </p>
                <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "22px", maxWidth: 360, margin: "0 auto 28px", textAlign: "left" }}>
                  <div style={{ fontSize: 10, color: C.muted, marginBottom: 14, textTransform: "uppercase", letterSpacing: "0.1em" }}>Resumen</div>
                  {[["Servicio", service?.name], ["Fecha", cap(fmtDate(date))], ["Hora", `${time}h`], ["Nombre", form.name], ["Teléfono", form.phone]].map(([k, v]) => (
                    <div key={k} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, padding: "7px 0", borderBottom: `1px solid ${C.border}` }}>
                      <span style={{ color: C.muted }}>{k}</span><span style={{ color: C.text }}>{v}</span>
                    </div>
                  ))}
                </div>
                <button onClick={goHome} style={outlineBtn}>Volver al inicio</button>
              </div>
            )}
          </div>
        </div>
      );

      // ADMIN
      if (view === "admin") return (
        <div style={{ background: C.bg, minHeight: "100vh", fontFamily: FONT, color: C.text }}>
          <div style={{ background: C.bgSoft, borderBottom: `1px solid ${C.border}`, padding: "0 24px" }}>
            <div style={{ maxWidth: 1040, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", height: 54 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <button onClick={() => setView("home")} style={{ ...ghostBtn }}>← Inicio</button>
                <span style={{ color: C.border }}>|</span>
                <div style={{ fontFamily: SERIF, fontSize: 17, color: C.primary, fontStyle: "italic" }}>Panel · Sensaciones Estilistas</div>
              </div>
              {adminAuth && <button onClick={() => { setAdminAuth(false); setAdminPass(""); }} style={{ background: C.bgSoft, border: `1px solid ${C.border}`, borderRadius: 6, padding: "6px 14px", fontSize: 12, color: C.muted, cursor: "pointer", fontFamily: FONT }}>Salir</button>}
            </div>
          </div>

          <div style={{ maxWidth: 1040, margin: "0 auto", padding: "36px 24px" }}>
            {!adminAuth && (
              <div style={{ maxWidth: 380, margin: "0 auto" }}>
                <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "40px 32px" }}>
                  <div style={{ textAlign: "center", marginBottom: 28 }}>
                    <div style={{ fontFamily: SERIF, fontSize: 28, color: C.primary, fontStyle: "italic", marginBottom: 6 }}>Acceso privado</div>
                    <p style={{ fontSize: 13, color: C.muted }}>Solo para el equipo de Sensaciones</p>
                  </div>
                  <label style={{ fontSize: 11, fontWeight: 500, color: C.textSoft, display: "block", marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.06em" }}>Contraseña</label>
                  <input type="password" value={adminPass} onChange={(e) => setAdminPass(e.target.value)} onKeyDown={(e) => e.key === "Enter" && tryLogin()} placeholder="••••••••" style={{ ...inp, marginBottom: 12 }} />
                  {adminErr && <div style={{ fontSize: 12, color: C.danger, marginBottom: 10 }}>{adminErr}</div>}
                  <button onClick={tryLogin} style={{ ...primaryBtn, width: "100%", textAlign: "center" }}>Entrar</button>
                  <div style={{ fontSize: 11, color: C.muted, textAlign: "center", marginTop: 12 }}>Demo: sensaciones2024</div>
                </div>
              </div>
            )}

            {adminAuth && (
              <>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 12, marginBottom: 28 }}>
                  {[
                    { label: "Citas hoy", value: todayAppts.length, color: C.primary },
                    { label: "Confirmadas hoy", value: todayAppts.filter((a) => a.status === "confirmada").length, color: C.success },
                    { label: "Pendientes", value: pendingTotal, color: C.warning },
                    { label: "Total agenda", value: appts.length, color: C.muted },
                  ].map((k, i) => (
                    <div key={i} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "18px", textAlign: "center" }}>
                      <div style={{ fontFamily: SERIF, fontSize: 32, color: k.color, lineHeight: 1, fontWeight: 500 }}>{k.value}</div>
                      <div style={{ fontSize: 11, color: C.muted, marginTop: 6, textTransform: "uppercase", letterSpacing: "0.05em" }}>{k.label}</div>
                    </div>
                  ))}
                </div>

                <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
                  {[["hoy", "Hoy"], ["manana", "Mañana"], ["todas", "Todas"]].map(([k, label]) => (
                    <button key={k} onClick={() => setFilter(k)}
                      style={{ padding: "8px 18px", borderRadius: 6, border: `1px solid ${filter === k ? C.primary : C.border}`, background: filter === k ? C.primaryLight : C.card, color: filter === k ? C.primary : C.muted, fontSize: 13, cursor: "pointer", fontFamily: FONT }}>
                      {label}
                    </button>
                  ))}
                </div>

                <div style={{ display: "grid", gap: 8 }}>
                  {getFiltered().length === 0 && <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "40px", textAlign: "center", color: C.muted }}>No hay citas para este período</div>}
                  {getFiltered().map((a) => (
                    <div key={a.id} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "15px 18px" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 }}>
                        <div style={{ flex: 1, minWidth: 200 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 5, flexWrap: "wrap" }}>
                            <span style={{ fontWeight: 500, fontSize: 15, color: C.text }}>{a.name}</span>
                            <span style={{ fontSize: 11, fontWeight: 600, padding: "2px 10px", borderRadius: 20, ...statusStyle(a.status) }}>{cap(a.status)}</span>
                            <span style={{ fontSize: 11, padding: "2px 10px", borderRadius: 20, background: `${getCatColor(a.service)}20`, color: getCatColor(a.service) }}>{a.service}</span>
                          </div>
                          <div style={{ fontSize: 13, color: C.muted, marginBottom: 2 }}>{cap(fmtDate(a.date))} · {a.time}h</div>
                          <div style={{ fontSize: 13, color: C.muted }}>{a.phone}{a.email ? ` · ${a.email}` : ""}</div>
                          {a.notes && <div style={{ fontSize: 12, color: C.muted, marginTop: 5, fontStyle: "italic", background: C.bgSoft, padding: "5px 10px", borderRadius: 6 }}>{a.notes}</div>}
                        </div>
                        <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                          {a.status === "pendiente" && <>
                            <button onClick={() => updateStatus(a.id, "confirmada")} style={{ padding: "7px 14px", borderRadius: 6, border: `1px solid ${C.success}`, background: C.successLight, color: C.success, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: FONT }}>Confirmar</button>
                            <button onClick={() => updateStatus(a.id, "cancelada")} style={{ padding: "7px 14px", borderRadius: 6, border: `1px solid ${C.danger}`, background: C.dangerLight, color: C.danger, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: FONT }}>Cancelar</button>
                          </>}
                          {a.status === "confirmada" && <button onClick={() => updateStatus(a.id, "cancelada")} style={{ padding: "7px 14px", borderRadius: 6, border: `1px solid ${C.danger}`, background: C.dangerLight, color: C.danger, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: FONT }}>Cancelar</button>}
                          {a.status === "cancelada" && <button onClick={() => updateStatus(a.id, "pendiente")} style={{ padding: "7px 14px", borderRadius: 6, border: `1px solid ${C.border}`, background: C.bgSoft, color: C.muted, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: FONT }}>Reactivar</button>}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}
          </div>
        </div>
      );

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
